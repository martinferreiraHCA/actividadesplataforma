<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Actividades — HCA</title>
  <meta name="description" content="Creá cuestionarios y actividades para Schoology, Moodle y Google Classroom en minutos.">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <header class="header-app">
    <div class="header-app__inner">
      <a href="index.html" class="header-app__brand">
        <span class="header-app__logo">HCA</span>
        Generador de Actividades
      </a>
    </div>
  </header>

  <main class="contenedor">
    <section class="hero-landing">
      <h1 class="hero-landing__titulo">Creá actividades para tu plataforma</h1>
      <p class="hero-landing__subtitulo">
        Generá cuestionarios listos para importar en Schoology, Moodle y Google Classroom. Sin instalar nada, desde el navegador.
      </p>
    </section>

    <section id="actividades" class="grilla-actividades" role="list" aria-label="Tipos de actividad">
    </section>
  </main>

  <footer class="footer-app">
    <p>Generador de Actividades — HCA. Hecho con 🧉 para docentes.</p>
  </footer>

  <script type="module">
    import { ACTIVITIES } from './js/activities.js';

    const grilla = document.getElementById('actividades');

    Object.entries(ACTIVITIES).forEach(([id, act]) => {
      const card = document.createElement('a');
      card.href = `editor.html?tipo=${id}`;
      card.className = 'card-actividad';
      card.setAttribute('role', 'listitem');
      card.innerHTML = `
        <div class="card-actividad__icono">${act.icono}</div>
        <div class="card-actividad__nombre">${act.nombre}</div>
        <div class="card-actividad__desc">${act.descripcion}</div>
      `;
      grilla.appendChild(card);
    });
  </script>

</body>
</html>
